# Services to start automatically
services:
  - NetworkManager # Network connection manager, handles network interfaces and connections
  - protonvpn.service # ProtonVPN daemon, provides VPN connectivity
  - tailscaled.service # Tailscale mesh VPN daemon, enables secure networking
  - ollama.service # Ollama LLM runner service, manages local LLMs
