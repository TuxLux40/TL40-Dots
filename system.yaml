  - gnome-keyring-daemon # GNOME keyring daemon, stores and manages secrets and passwords
  - bluetooth.service # Bluetooth service, manages Bluetooth devices and connections
  - openrgb.service # OpenRGB service, manages RGB lighting for compatible hardware

commands:
  - if ! command -v brew &> /dev/null; then /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"; fi
  - echo >> /home/oliver/.bashrc
  - echo 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"' >> /home/oliver/.bashrc
  - eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
  - echo -e "ip_tables\niptable_nat" | sudo tee /etc/modules-load.d/iptables.conf

